<style>
:root{
  --ocean:#0d6e75; --ocean-d:#0a565c; --ocean-l:#e6f2f3;
  --sand:#f7f4ee; --surface:#ffffff; --line:#e7e2d8;
  --ink:#1f2a2c; --muted:#6c7a7c;
  --coral:#e8663d; --coral-d:#cf5530;
  --green:#1f9d6b; --amber:#e0a32e; --red:#d34c4c; --blue:#3a78c2; --gray:#9aa6a7; --purple:#7e57c2;
  --shadow:0 1px 2px rgba(16,40,42,.06),0 8px 24px rgba(16,40,42,.08);
  --r:16px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--sand);color:var(--ink);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:16px}
.app{max-width:920px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:30;background:var(--ocean);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px;padding-top:max(14px,env(safe-area-inset-top))}
.topbar .brand{font-weight:800;letter-spacing:.2px;font-size:18px;display:flex;align-items:center;gap:9px}
.topbar .logobox{background:#fff;border-radius:9px;padding:5px 11px;display:inline-flex;box-shadow:0 1px 4px rgba(0,0,0,.18)}
.topbar .logobox img{height:26px;display:block}
.loginlogo{display:flex;justify-content:center;margin:2px 0 14px}
.loginlogo img{height:62px;max-width:80%;object-fit:contain}
.topbar .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--coral);box-shadow:0 0 0 4px rgba(232,102,61,.25)}
.topbar .sp{flex:1}
.topbar .who{font-size:13px;opacity:.95;text-align:right;line-height:1.2}
.iconbtn{color:#fff;background:rgba(255,255,255,.14);width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:18px}
.iconbtn:active{transform:scale(.96)}
.content{flex:1;padding:16px;padding-bottom:46px}
.backrow{display:flex;align-items:center;gap:10px;margin:-4px 0 14px}
.backbtn{background:#fff;border:1px solid var(--line);border-radius:11px;padding:9px 14px;font-weight:600;color:var(--ink);box-shadow:var(--shadow)}
.h1{font-size:22px;font-weight:800;margin:0}
.sub{color:var(--muted);font-size:14px;margin:2px 0 0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(min-width:620px){.grid{grid-template-columns:1fr 1fr 1fr}}
.tile{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px 16px;box-shadow:var(--shadow);text-align:left;display:flex;flex-direction:column;gap:10px;min-height:128px;transition:transform .08s}
.tile:active{transform:translateY(1px) scale(.995)}
.tile .ico{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;font-size:24px;color:#fff}
.tile .t{font-weight:700;font-size:16px}
.tile .d{color:var(--muted);font-size:12.5px;line-height:1.35}
.tile .badge{align-self:flex-start;background:var(--ocean-l);color:var(--ocean-d);font-weight:700;font-size:12px;border-radius:999px;padding:3px 10px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
.card h3{margin:0 0 4px;font-size:16px}
.field{margin-bottom:13px}
.field label{display:block;font-weight:600;font-size:13.5px;margin-bottom:6px}
.field .req{color:var(--coral)}
.inp,select.inp,textarea.inp{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px 13px;background:#fff;color:var(--ink)}
.inp:focus,textarea.inp:focus,select.inp:focus{outline:none;border-color:var(--ocean);box-shadow:0 0 0 3px var(--ocean-l)}
textarea.inp{min-height:88px;resize:vertical}
.hint{color:var(--muted);font-size:12px;margin-top:5px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:700;border-radius:13px;padding:13px 18px;font-size:15px}
.btn.primary{background:var(--coral);color:#fff}
.btn.primary:active{background:var(--coral-d)}
.btn.ocean{background:var(--ocean);color:#fff}
.btn.ocean:active{background:var(--ocean-d)}
.btn.ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}
.btn.green{background:var(--green);color:#fff}
.btn.amber{background:var(--amber);color:#fff}
.btn.red{background:var(--red);color:#fff}
.btn.block{width:100%}
.btn:disabled{opacity:.5}
.row{display:flex;gap:10px;flex-wrap:wrap}
.row.end{justify-content:flex-end}
.pill{display:inline-flex;align-items:center;gap:6px;font-weight:700;font-size:11.5px;border-radius:999px;padding:4px 10px;white-space:nowrap}
.pill .pdot{width:7px;height:7px;border-radius:50%}
.item{background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px 14px;box-shadow:var(--shadow);margin-bottom:11px}
.item .top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.item .code{font-size:11.5px;color:var(--muted);font-weight:700;letter-spacing:.4px}
.item .ttl{font-weight:700;font-size:15px;margin:3px 0 2px;line-height:1.3}
.item .meta{font-size:12.5px;color:var(--muted)}
.item .acts{margin-top:11px;display:flex;gap:8px;flex-wrap:wrap}
.empty{text-align:center;color:var(--muted);padding:46px 16px}
.empty .e{font-size:40px}
.seg{display:flex;background:#eee9df;border-radius:13px;padding:4px;gap:4px;margin-bottom:14px;overflow:auto}
.seg button{flex:1;white-space:nowrap;border-radius:10px;padding:9px 12px;font-weight:700;font-size:13.5px;color:var(--muted)}
.seg button.on{background:#fff;color:var(--ocean-d);box-shadow:var(--shadow)}
/* checklist ILD */
.crow{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:12px;padding:12px 13px;margin-bottom:9px;background:#fff;cursor:pointer}
.crow.on{border-color:var(--green);background:#f1faf5}
.cbox{width:26px;height:26px;border-radius:8px;border:2px solid #cdd5d4;display:grid;place-items:center;color:#fff;font-weight:800;flex:0 0 auto}
.crow.on .cbox{background:var(--green);border-color:var(--green)}
.ctext{font-size:14px;font-weight:500}
.qcard{border:1px solid var(--line);border-radius:12px;padding:12px 13px;margin-bottom:9px;background:#fff}
.qcard .qt{font-weight:600;font-size:13.5px;margin-bottom:9px}
.opts{display:flex;gap:8px;flex-wrap:wrap}
.opt{flex:1;min-width:84px;text-align:center;border:2px solid var(--line);border-radius:10px;padding:9px 8px;font-weight:700;font-size:13px;color:var(--muted)}
.opt.on{border-color:var(--ocean);background:var(--ocean-l);color:var(--ocean-d)}
.opt.si.on{border-color:var(--green);background:#e9f7f0;color:var(--green)}
.opt.no.on{border-color:var(--red);background:#fdeeee;color:var(--red)}
.pbar{height:8px;background:#e8e2d6;border-radius:6px;overflow:hidden;margin:8px 0 14px}
.pbar i{display:block;height:100%;background:var(--ocean);transition:width .25s}
.fgrid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.fthumb{position:relative;width:74px;height:74px;border-radius:10px;overflow:hidden;border:1px solid var(--line)}
.fthumb img{width:100%;height:100%;object-fit:cover}
.fdel{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.55);color:#fff;border-radius:50%;width:22px;height:22px;font-size:12px}
.fnum{position:absolute;bottom:2px;left:2px;background:rgba(0,0,0,.55);color:#fff;border-radius:6px;font-size:10px;padding:0 5px}
.kv{display:flex;justify-content:space-between;gap:10px;font-size:13.5px;padding:7px 0;border-bottom:1px solid var(--line)}
.kv:last-child{border-bottom:none}
.kv b{color:var(--muted);font-weight:600}
.note{border-radius:12px;padding:12px 13px;margin:10px 0;font-size:13.5px}
.note.obs{background:#fff8e1;border:1px solid #ffe0a3}
.note.jef{background:#f3eafc;border:1px solid #d9c2f0}
.note.ger{background:#e9f7f0;border:1px solid #aedcc6}
.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
@media(min-width:560px){.kpis{grid-template-columns:repeat(5,1fr)}}
.kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px;text-align:center;box-shadow:var(--shadow)}
.kpi .kn{font-size:22px;font-weight:800}
.kpi .kl{font-size:11px;color:var(--muted);margin-top:2px}
.barline{margin-bottom:11px}
.barline .lab{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:3px}
.barwrap{display:flex;height:10px;border-radius:6px;overflow:hidden;background:#eee7da}
.stars{display:flex;gap:4px;font-size:24px}
.stars span{cursor:pointer;color:#d8d2c5}
.stars span.on{color:var(--amber)}
.kan{display:flex;gap:12px;overflow-x:auto;padding-bottom:10px}
.kcol{flex:0 0 80%;max-width:300px;background:#efe9de;border-radius:16px;padding:11px}
@media(min-width:760px){.kcol{flex:0 0 250px}}
.kcol h4{margin:2px 4px 10px;font-size:13.5px;display:flex;justify-content:space-between;align-items:center}
.kcol h4 .cnt{background:#fff;border-radius:999px;font-size:12px;padding:1px 9px;color:var(--muted)}
.kcard{background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px;margin-bottom:9px;box-shadow:var(--shadow)}
.kcol.over{outline:2px dashed var(--ocean);outline-offset:-4px}
.kchip{display:inline-block;font-size:10.5px;font-weight:700;border-radius:999px;padding:2px 8px;background:#eef3f6;color:#3c5b66}
.kchip.urg{background:#fbe6e6;color:#a83232}
.kcol h4 .dotc{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:7px;vertical-align:middle}
.kfilters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.kfilters select{flex:1;min-width:150px;border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:#fff;font-size:14px}
.kcount{font-size:12px;color:var(--muted);margin:-4px 0 12px}
.dgrp{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden}
.dgrp .ghead{background:var(--ocean);color:#fff;font-weight:800;font-size:13px;letter-spacing:.4px;padding:11px 14px;display:flex;align-items:center;gap:8px}
.dscroll{overflow-x:auto}
.dtable{width:100%;border-collapse:collapse;min-width:560px}
.dtable th{background:#f6f2ea;color:var(--muted);font-size:10.5px;font-weight:800;letter-spacing:.3px;text-transform:uppercase;padding:9px 8px;text-align:center;white-space:nowrap}
.dtable th:first-child{text-align:left;padding-left:14px}
.dtable td{padding:11px 8px;text-align:center;border-top:1px solid #f0ebe1;font-size:13.5px;white-space:nowrap}
.dtable td:first-child{text-align:left;padding-left:14px;font-weight:700}
.dnum{display:inline-block;min-width:34px;border:1px solid var(--line);border-radius:9px;padding:3px 6px;font-weight:700;background:#fff}
.dnum.g{color:var(--green);border-color:#bfe6d3}
.dnum.p{color:var(--purple);border-color:#ddccf0}
.dcirc{display:inline-grid;place-items:center;width:42px;height:42px;border-radius:50%;font-weight:800;font-size:12px;border:2.5px solid}
.ddias{font-size:11px;color:var(--muted)}
.kcard .kc{font-size:11px;color:var(--muted);font-weight:700}
.kcard .kt{font-weight:600;font-size:13.5px;margin:3px 0;line-height:1.3}
.kcard .km{font-size:11.5px;color:var(--muted)}
.kcard select{margin-top:8px;width:100%;border:1px solid var(--line);border-radius:9px;padding:7px;font-size:12.5px}
.ovl{position:fixed;inset:0;background:rgba(16,30,32,.5);z-index:50;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:620px){.ovl{align-items:center;padding:20px}}
.modal{background:#fff;width:100%;max-width:600px;border-radius:20px 20px 0 0;padding:18px;max-height:92vh;overflow:auto}
@media(min-width:620px){.modal{border-radius:20px}}
.modal h3{margin:0 0 12px;font-size:18px}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 18px;border-radius:13px;font-weight:600;font-size:14px;z-index:80;box-shadow:var(--shadow);max-width:90%;text-align:center}
.banner{background:#fff7e8;border:1px solid #f0d9a0;color:#8a6512;border-radius:12px;padding:10px 12px;font-size:12.5px;margin-bottom:14px;display:flex;gap:8px;align-items:flex-start}
.ver{font-size:11px;color:var(--muted);text-align:center;padding:18px 0 8px}
.fotomodal{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:90;display:flex;align-items:center;justify-content:center;padding:16px}
.fotomodal img{max-width:96vw;max-height:90vh;border-radius:10px;object-fit:contain}
.fotomodal .x{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.2);color:#fff;border-radius:50%;width:42px;height:42px;font-size:20px}
/* ===== LOGIN (rediseñado) ===== */
.login{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;
  background:radial-gradient(120% 80% at 50% -10%, #14808a 0%, var(--ocean) 42%, var(--ocean-d) 78%, #073e43 100%)}
.login .sun{position:absolute;top:-90px;left:50%;transform:translateX(-50%);width:260px;height:260px;border-radius:50%;
  background:radial-gradient(circle, rgba(255,196,140,.45) 0%, rgba(232,102,61,.12) 55%, transparent 70%);pointer-events:none}
.login .wave{position:absolute;bottom:0;left:0;right:0;height:120px;background:
  radial-gradient(120% 100% at 50% 120%, rgba(255,255,255,.10), transparent 60%);pointer-events:none}
.lcard{position:relative;z-index:2;background:rgba(255,255,255,.97);border-radius:24px;padding:26px 22px;width:100%;max-width:380px;
  box-shadow:0 24px 60px rgba(0,0,0,.28);text-align:center}
.lbrand{display:flex;align-items:center;justify-content:center;gap:10px;font-size:22px;font-weight:800;color:var(--ocean-d)}
.lbrand .dot{width:12px;height:12px;border-radius:50%;background:var(--coral);box-shadow:0 0 0 5px rgba(232,102,61,.18)}
.ltag{color:var(--muted);font-size:13px;margin:4px 0 20px}
.lchoice{display:flex;flex-direction:column;gap:11px}
.lbig{display:flex;align-items:center;gap:13px;text-align:left;border:1.5px solid var(--line);border-radius:15px;padding:15px;background:#fff;transition:.12s}
.lbig:active{transform:scale(.99)}
.lbig.pri{border-color:var(--ocean);background:var(--ocean-l)}
.lbig .e{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-size:22px;color:#fff;flex:0 0 auto}
.lbig .tt{font-weight:700;font-size:15px;color:var(--ink)}
.lbig .dd{font-size:12px;color:var(--muted);margin-top:1px}
.lsel{width:100%;border:1.5px solid var(--line);border-radius:13px;padding:13px;font-size:15px;background:#fff;margin-bottom:14px}
.ldots{display:flex;gap:13px;justify-content:center;margin:4px 0 18px;height:16px}
.ldots i{width:14px;height:14px;border-radius:50%;background:#e2ddd2;transition:.15s}
.ldots i.f{background:var(--coral);transform:scale(1.05)}
.lpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.lpad button{height:58px;border-radius:14px;background:#f3efe6;color:var(--ink);font-size:22px;font-weight:600;border:1px solid var(--line)}
.lpad button:active{background:var(--ocean-l)}
.lpad button.fn{font-size:14px;font-weight:700;color:var(--muted);background:#fff}
.lback{margin-top:16px;color:var(--ocean-d);font-weight:700;font-size:14px;background:none}
.lerr{color:var(--red);font-weight:600;font-size:13px;min-height:18px;margin-top:8px}
.lfoot{position:relative;z-index:2;color:rgba(255,255,255,.8);font-size:11px;margin-top:18px}
</style>
</head>

function defaultPuede(u,cap){
  if(!u) return false;
  const [mod,sub]=cap.split(".");

    if(cap==='compras') return u.rol!=='colaborador';
    if(cap==='sistemas'||cap==='mantenimiento') return true;
    if(cap==='ild') return ildAreasDe(u).length>0 || esGD(u);

  if(sub==='tablero') return gestionaModulo(u,mod) || esGD(u);
  if(cap==='kanban.editar') return esDev(u) || (u.gestiona||[]).length>0;
  return false;
}

function comprimirImg(dataUrl,maxPx=900,q=0.75){
  return new Promise(res=>{ const img=new Image();
    img.onload=()=>{ let w=img.width,h=img.height;
      if(w>maxPx||h>maxPx){const s=Math.min(maxPx/w,maxPx/h);w=Math.round(w*s);h=Math.round(h*s);}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',q)); };
    img.onerror=()=>res(dataUrl); img.src=dataUrl; });
}

const GBASE="https://graph.microsoft.com/v1.0";
async function gfetch(path,method="GET",body=null,raw=false,headers=null){
  const h={Authorization:`Bearer ${graphToken}`};
  if(headers) Object.assign(h,headers);
  if(body && !(body instanceof ArrayBuffer)) h["Content-Type"]="application/json";
  else if(body instanceof ArrayBuffer) h["Content-Type"]="application/octet-stream";
  const ctrl=new AbortController(); const to=setTimeout(()=>ctrl.abort(),30000);
  let r; try{ r=await fetch(GBASE+path,{method,headers:h,body:body?(body instanceof ArrayBuffer?body:JSON.stringify(body)):null,signal:ctrl.signal}); }
  catch(e){ clearTimeout(to); throw new Error("conexión: "+(e.name==="AbortError"?"tiempo de espera agotado":e.message)); }
  clearTimeout(to);
  if(r.status===204) return null;
  if(!r.ok){ let extra=""; try{ const j=await r.json(); extra=j.error&&j.error.message?(" — "+j.error.message):""; }catch{} throw new Error(method+" "+path.split("?")[0]+": "+r.status+extra); }
  return raw?r.arrayBuffer():r.json();
}

      return JSON.parse(new TextDecoder().decode(buf)); }catch{ return []; } },
  async write(t,arr){
    const buf=new TextEncoder().encode(JSON.stringify(arr));

  async ensureCarpeta(carpetaId){ const folder=`${APP.ms.base}/${APP.ms.fotosFolder}`;

const recFecha=r=>String(r.fecha||r.FechaSolicitud||r.FechaCreacion||"").slice(0,10);

async function spSite(){ if(SP_SITE) return SP_SITE;

async function spEnsureCols(site,lid,t){ if(SP_COLS[t]) return;
  try{ const cols=await gfetch(`/sites/${site}/lists/${lid}/columns?$select=name`);
    const have=new Set((cols.value||[]).map(c=>c.name));
    for(const c of ["Fecha","Estado"]) if(!have.has(c)){ try{ await gfetch(`/sites/${site}/lists/${lid}/columns`,"POST",{name:c,text:{}}); }catch(e){} }
  }catch(e){} SP_COLS[t]=true; }
async function spEnsureList(t){ const site=await spSite();
  if(SP_LIST[t]){ await spEnsureCols(site,SP_LIST[t],t); return SP_LIST[t]; }
  const name=APP.ms.lists[t];
  const all=await gfetch(`/sites/${site}/lists?$select=id,displayName&$top=200`);
  let lid=(all.value||[]).find(l=>l.displayName===name)?.id;
  if(!lid){ const created=await gfetch(`/sites/${site}/lists`,"POST",{displayName:name,
    columns:[{name:"Data",text:{allowMultipleLines:true}},{name:"Fecha",text:{}},{name:"Estado",text:{}}],
    list:{template:"genericList"}}); lid=created.id; }
  SP_LIST[t]=lid; await spEnsureCols(site,lid,t); return lid; }
function spMerge(t,items){ const map=SP_MAP[t]||new Map();
  items.forEach(it=>{ const d=it.fields&&it.fields.Data; if(!d) return; let rec; try{rec=JSON.parse(d);}catch{return;}
    map.set(rec.id,{spId:it.id,hash:d}); }); SP_MAP[t]=map; }
async function spPages(t,query){ const site=await spSite(); const lid=await spEnsureList(t);
  let url=`/sites/${site}/lists/${lid}/items?$expand=fields($select=Data)&$top=500${query?("&"+query):""}`;
  const items=[]; while(url){ const page=await gfetch(url.replace(GBASE,""),"GET",null,false,PREFER_NX);
    (page.value||[]).forEach(x=>items.push(x)); url=page["@odata.nextLink"]||null; } return items; }
const ListStore={
  async read(t){ const items=await spPages(t,""); spMerge(t,items);
    return items.map(it=>{try{return JSON.parse(it.fields.Data);}catch{return null;}}).filter(Boolean); },
  async readDesde(t,since){ try{ const items=await spPages(t,`$filter=fields/Fecha ge '${since}'`); spMerge(t,items);
      return items.map(it=>{try{return JSON.parse(it.fields.Data);}catch{return null;}}).filter(Boolean);
    }catch(e){ return (await this.read(t)).filter(r=>recFecha(r)>=since); } },
  async readRango(t,desde,hasta){ try{ const items=await spPages(t,`$filter=fields/Fecha ge '${desde}' and fields/Fecha lt '${hasta}'`); spMerge(t,items);
      return items.map(it=>{try{return JSON.parse(it.fields.Data);}catch{return null;}}).filter(Boolean);
    }catch(e){ return (await this.read(t)).filter(r=>recFecha(r)>=desde&&recFecha(r)<hasta); } },
  async write(t,arr){ const site=await spSite(); const lid=await spEnsureList(t);
    if(!SP_MAP[t]) await this.read(t); const map=SP_MAP[t]||new Map();
    for(const rec of arr){ const j=JSON.stringify(rec); const m=map.get(rec.id);
      const full={Title:String(rec.Codigo||rec.id||"").slice(0,255),Data:j,Fecha:recFecha(rec),Estado:recEstado(rec)};
      const basico={Title:full.Title,Data:j};
      if(!m){ let c; try{ c=await gfetch(`/sites/${site}/lists/${lid}/items`,"POST",{fields:full}); }
          catch(e){ c=await gfetch(`/sites/${site}/lists/${lid}/items`,"POST",{fields:basico}); }
        map.set(rec.id,{spId:c.id,hash:j}); }
      else if(m.hash!==j){ try{ await gfetch(`/sites/${site}/lists/${lid}/items/${m.spId}/fields`,"PATCH",full); }
          catch(e){ await gfetch(`/sites/${site}/lists/${lid}/items/${m.spId}/fields`,"PATCH",basico); } m.hash=j; } }
    SP_MAP[t]=map; },
  async remove(t,id){ const site=await spSite(); const lid=await spEnsureList(t);
    if(!SP_MAP[t]) await this.read(t); const m=(SP_MAP[t]||new Map()).get(id);
    if(m){ try{ await gfetch(`/sites/${site}/lists/${lid}/items/${m.spId}`,"DELETE"); }catch(e){} SP_MAP[t].delete(id); } }
};

// Al cargar: recupera token (de una redirección de vuelta o de sesión previa). No abre nada.
async function msEnsure(){
  if(typeof msal==="undefined"){ msErr="No se cargó MSAL (la red bloqueó la CDN)."; return false; }
  try{ await msInitApp();
    let resp=null; try{ resp=await msalApp.handleRedirectPromise(); }catch(e){ msErr=e.errorMessage||e.message||String(e); }
    if(resp && resp.accessToken){ graphToken=resp.accessToken; await setGraphUser(resp.account); return true; }
    const accs=msalApp.getAllAccounts();
    if(accs.length){ try{ const r=await msalApp.acquireTokenSilent({scopes:MS_SCOPES,account:accs[0]});
      graphToken=r.accessToken; await setGraphUser(accs[0]); return true; }catch(e){} }
  }catch(e){ msErr=e.errorMessage||e.message||String(e); }
  return false;
}

const DIAS_CFG = { feriados:[], areas:{} };  // areas[area] = {patron:'diario'|'finde'|'vsd'|'personalizado', dias:[0..6]}
function patronDias(p){ return p==='finde'?[0,6]:p==='vsd'?[0,5,6]:p==='diario'?[0,1,2,3,4,5,6]:null; }
function diasEsperados(area,year,month,hastaHoy){
  const cfg=DIAS_CFG.areas[area]||{patron:'diario'};
  let set = cfg.patron==='personalizado' ? (cfg.dias||[]) : patronDias(cfg.patron);
  if(!set) set=[0,1,2,3,4,5,6];
  const hoy=new Date(); const lastDay=new Date(year,month+1,0).getDate();
  const limit = (hastaHoy && hoy.getFullYear()===year && hoy.getMonth()===month) ? hoy.getDate() : lastDay;
  const fer=(DIAS_CFG.feriados||[]).map(f=>new Date(f+"T00:00:00")).filter(d=>d.getFullYear()===year&&d.getMonth()===month).map(d=>d.getDate());
  let n=0; for(let d=1; d<=limit; d++){ const wd=new Date(year,month,d).getDay(); if(set.includes(wd)||fer.includes(d)) n++; }
  return n;
}

function ildToRow(r){ return {
  Codigo:r.Codigo||("ILD-"+r.id), Area:r.area, Turno:r.turno||"", Responsable:r.usuario,
  Fecha:r.fecha?new Date(r.fecha).toLocaleString("es-EC"):"", Estado:r.estado,
  Completados:r.completados, Total:r.totalItems,
  Cumplimiento:r.totalItems?Math.round((r.completados/r.totalItems)*100)+"%":"",
  Fotos:(r.fotos||[]).length, Aprobador:r.aprobador||"", FechaAprobacion:r.fechaAprobacion?new Date(r.fechaAprobacion).toLocaleString("es-EC"):"",
  Observaciones:r.obs||"", NotaJefatura:r.notaJef||"", NotaGerencia:r.notaGerencia||"" }; }
function exportXLSX(rows,sheet,filename){
  if(!rows||!rows.length) return false;
  const clean=rows.map(r=>{ const o={...r}; delete o.Fotos; delete o.fotos; delete o.checks; delete o.textos; delete o.selecciones;
    Object.keys(o).forEach(k=>{ if(o[k]&&typeof o[k]==="object") o[k]=JSON.stringify(o[k]); }); return o; });
  if(window.XLSX && !window.__noXlsx){
    const ws=XLSX.utils.json_to_sheet(clean); const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,(sheet||"Datos").slice(0,31)); XLSX.writeFile(wb,filename+".xlsx"); return true; }
  const head=[...new Set(clean.flatMap(o=>Object.keys(o)))];
  const csv=[head.join(",")].concat(clean.map(r=>head.map(h=>`"${String(r[h]??"").replace(/"/g,'""')}"`).join(","))).join("\n");
  const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob(["\ufeff"+csv],{type:"text/csv"})); a.download=filename+".csv"; a.click(); return true;
}

function Field({label,req,children,hint}){
  return <div className="field"><label>{label} {req&&<span className="req">*</span>}</label>{children}
    {hint&&<div className="hint">{hint}</div>}</div>;
}
function Modal({title,onClose,children}){
  return <div className="ovl" onClick={onClose}>

function PhotoField({fotos,setFotos,multiple=true,label,req,hint,setFoto}){
  const ref=useRef();
  async function onFiles(e){ const files=Array.from(e.target.files); e.target.value="";
    const srcs=await Promise.all(files.map(f=>new Promise(r=>{const rd=new FileReader();rd.onload=ev=>r(ev.target.result);rd.readAsDataURL(f);})));
    const comp=await Promise.all(srcs.map(s=>comprimirImg(s,1000,.7)));
    setFotos(multiple?[...fotos,...comp]:comp.slice(0,1)); }
  return <Field label={label} req={req} hint={hint}>
    <input ref={ref} type="file" accept="image/*" capture="environment" multiple={multiple} style={{display:"none"}} onChange={onFiles}/>
    <button className="btn ghost block" onClick={()=>ref.current.click()}>📷 {fotos.length?`${fotos.length} foto(s) — agregar más`:"Subir foto"}</button>
    <div className="fgrid">{fotos.map((s,i)=><div key={i} className="fthumb"><img src={s} onClick={()=>setFoto&&setFoto(s)}/>
      <button className="fdel" onClick={()=>setFotos(fotos.filter((_,j)=>j!==i))}>✕</button><span className="fnum">{i+1}</span></div>)}</div>
  </Field>;
}

function Login({onLogin}){
  const [step,setStep]=useState("choice"); // choice | pin | libre
  const pinUsers=USERS.filter(u=>u.pin);
  const colabs=USERS.filter(u=>u.rol==='colaborador').sort((a,b)=>a.nombre.localeCompare(b.nombre));
  const [name,setName]=useState(""); const [pin,setPin]=useState(""); const [err,setErr]=useState("");
  const press=d=>{ setErr(""); setPin(p=> p.length<4 ? p+d : p); };
  useEffect(()=>{ if(step==='pin'&&pin.length===4){
    const u=pinUsers.find(x=>x.nombre===name&&x.pin===pin);
    if(u){ setTimeout(()=>onLogin(u),120); } else { setErr("PIN incorrecto"); setTimeout(()=>setPin(""),450); }
  }},[pin]);
  return <div className="login">
    <div className="sun"></div><div className="wave"></div>
    <div className="lcard">
      <div className="loginlogo"><img src={LOGO} alt="Playa Paraíso"/></div>

      {step==="choice" && <div className="lchoice">
        <button className="lbig pri" onClick={()=>{setStep("pin");setName(pinUsers[0]?.nombre||"");setPin("");setErr("");}}>
          <span className="e" style={{background:"var(--ocean)"}}>🔐</span>
          <span><span className="tt">Ingresar con PIN</span><span className="dd">Jefaturas · Aprobadores · Gerencia</span></span></button>
        <button className="lbig" onClick={()=>{setStep("libre");setName("");setErr("");}}>
          <span className="e" style={{background:"var(--coral)"}}>👤</span>
          <span><span className="tt">Soy colaborador</span><span className="dd">Sin PIN — solo elige tu nombre</span></span></button>
      </div>}

      {step==="pin" && <div>
        <select className="lsel" value={name} onChange={e=>{setName(e.target.value);setPin("");setErr("");}}>
          {pinUsers.map(u=><option key={u.id} value={u.nombre}>{u.nombre}</option>)}</select>
        <div className="ldots">{[0,1,2,3].map(i=><i key={i} className={i<pin.length?"f":""}/>)}</div>
        <div className="lpad">
          {[1,2,3,4,5,6,7,8,9].map(n=><button key={n} onClick={()=>press(""+n)}>{n}</button>)}
          <button className="fn" onClick={()=>setPin(p=>p.slice(0,-1))}>Borrar</button>
          <button onClick={()=>press("0")}>0</button>
          <button className="fn" onClick={()=>setPin("")}>Limpiar</button>
        </div>
        <div className="lerr">{err}</div>
        <button className="lback" onClick={()=>{setStep("choice");setPin("");setErr("");}}>← Volver</button>
      </div>}

      {step==="libre" && <div>
        <select className="lsel" value={name} onChange={e=>{setName(e.target.value);setErr("");}}>
          <option value="">Selecciona tu nombre…</option>
          {colabs.map(u=><option key={u.id} value={u.nombre}>{u.nombre}</option>)}</select>
        <button className="btn primary block" onClick={()=>{ const u=colabs.find(x=>x.nombre===name);
          if(!u){setErr("Selecciona tu nombre");return;} onLogin(u); }}>Entrar</button>
        <div className="lerr">{err}</div>
        <button className="lback" onClick={()=>{setStep("choice");setErr("");}}>← Volver</button>
      </div>}
    </div>
    <div className="lfoot">{APP.version}</div>
  </div>;
}

/* ===== MÓDULO ILD ===== */
function ILD({user,toast,setFoto,bump}){
  const esDevv = esDev(user); const esGer = user.rol==='gerencia';
  const puedeRevisar = esGD(user) || user.rol==='aprobador';
  const showNuevo = !esGer;                                  // Gerencia no ingresa ILD
  const showChecklist = (user.rol==='aprobador' || esDevv);  // Gerencia no edita checklist
  const [tab,setTab]=useState(esGer?"bandeja":"nuevo");
  const [regs,setRegs]=useState([]);
  const load=async()=>setRegs(await Store.readDesde("ILD", desdeDias(150)));
  useEffect(()=>{load();},[]);
  const guardarCfg=()=>{ cfgSave(); bump&&bump(); };
  return <div>
    <h1 className="h1">ILD · Inspección diaria</h1>
    <p className="sub">Lista de verificación por área y turno.</p>
    {(showNuevo||puedeRevisar||showChecklist||esDevv) && <div className="seg">
      {showNuevo && <button className={tab==="nuevo"?"on":""} onClick={()=>setTab("nuevo")}>Nuevo</button>}
      {showNuevo && <button className={tab==="mios"?"on":""} onClick={()=>{setTab("mios");load();}}>Mis ILD</button>}
      {puedeRevisar && <button className={tab==="bandeja"?"on":""} onClick={()=>{setTab("bandeja");load();}}>{esGD(user)?"Todos":"Por aprobar"}</button>}
      {puedeRevisar && <button className={tab==="dash"?"on":""} onClick={()=>{setTab("dash");load();}}>Dashboard</button>}
      {showChecklist && <button className={tab==="check"?"on":""} onClick={()=>setTab("check")}>Checklist</button>}
      {esDevv && <button className={tab==="conf"?"on":""} onClick={()=>setTab("conf")}>Configurar</button>}
    </div>}
    {tab==="nuevo" && showNuevo && <ILDForm user={user} toast={toast} onSaved={()=>{load();setTab("mios");}} setFoto={setFoto}/>}
    {tab==="mios" && showNuevo && <ILDMios user={user} regs={regs} setFoto={setFoto}/>}
    {tab==="bandeja" && <ILDPanel user={user} regs={regs} reload={load} toast={toast} setFoto={setFoto}/>}
    {tab==="dash" && <ILDDash user={user} regs={regs}/>}
    {tab==="check" && showChecklist && <ChecklistEditor user={user} toast={toast} onSave={guardarCfg}/>}
    {tab==="conf" && esDevv && <ILDConfig user={user} toast={toast} onSave={guardarCfg}/>}
  </div>;
}

function ILDForm({user,toast,onSaved,setFoto}){
  const areas=ildAreasDe(user);
  const [area,setArea]=useState(""); const [turno,setTurno]=useState("");
  const [checks,setChecks]=useState({}); const [sel,setSel]=useState({}); const [txt,setTxt]=useState({});
  const [fotos,setFotos]=useState([]); const [obs,setObs]=useState(""); const [busy,setBusy]=useState(false);
  const [zona,setZona]=useState("");
  const modo=area?areaModo(area):'normal';
  const needsTurno=area && AC[area]?.turno && modo!=='lista';
  const items=area?(CL[area]||[]):[];
  function resetCampos(){ setChecks({});setSel({});setTxt({});setFotos([]);setObs("");setZona(""); }
  useEffect(()=>{ resetCampos(); setTurno(""); },[area]);
  const req=fotosReq(area);
  // progreso
  let total=0,done=0;
  items.forEach((it,i)=>{ const t=itemTipo(it);
    if(t==='foto'){total++; if(checks[i])done++;}
    else if(t==='sino'){total++; if(checks['yn-'+i])done++;}
    else if(t==='apertura_cierre'||t==='comida'){total++; if(sel[i])done++;} });
  const pct=total?Math.round(done/total*100):0;
  async function onFiles(e){
    const files=Array.from(e.target.files); e.target.value="";
    const srcs=await Promise.all(files.map(f=>new Promise(r=>{const rd=new FileReader();rd.onload=ev=>r(ev.target.result);rd.readAsDataURL(f);})));
    const comp=await Promise.all(srcs.map(s=>comprimirImg(s)));
    setFotos(prev=>[...prev,...comp].slice(0,Math.max(req,1)+4));
  }
  async function enviar(){
    if(!area){toast("Selecciona un área");return;}
    if(modo==='lista'){
      if(!zona){toast("Elige una zona de la lista");return;}
      if(fotos.length<3){toast("Adjunta al menos 3 fotos");return;}
      if(fotos.length>5){toast("Máximo 5 fotos");return;}
      if(busy) return; setBusy(true);
      try{ const id=gid();
        const fotosData=await subirFotos(fotos,`ILD_${id}`,`ILD${id}`);
        const arr=await Store.read("ILD"); const Codigo=nextCode("ILD",arr);
        const nuevo={id,Codigo,area,turno:"",zona,selecciones:{},usuario:user.nombre,fecha:nowISO(),
          checks:{},textos:{},fotos:fotosData,obs,estado:"Pendiente",notaJef:"",aprobador:"",fechaAprobacion:"",
          notaGerencia:"",totalItems:1,completados:1,aprobadorEsperado:APR[area]||"—"};
        await Store.write("ILD",[nuevo,...arr]);
        toast("ILD enviado: "+Codigo+" · "+zona); resetCampos(); setArea(""); onSaved();
      }catch(e){ toast("No se pudo enviar: "+(e.message||"error")); }
      finally{ setBusy(false); }
      return;
    }
    if(needsTurno && !turno){toast("Selecciona el turno");return;}
    const selFaltan=items.map((it,i)=>({it,i})).filter(o=>(itemTipo(o.it)==='apertura_cierre'||itemTipo(o.it)==='comida')&&!sel[o.i]);
    if(selFaltan.length){toast("Elige una opción en: "+itemText(selFaltan[0].it));return;}
    if(done<total && !confirm(`${total-done} ítems sin responder. ¿Enviar igual?`)) return;
    if(fotos.length<req && !confirm(`Solo ${fotos.length}/${req} fotos. ¿Continuar?`)) return;
    if(busy) return; setBusy(true);
    try{
      const id=gid();
      const fotosData=await subirFotos(fotos,`ILD_${id}`,`ILD${id}`);
      const arr=await Store.read("ILD");
      const Codigo=nextCode("ILD",arr);
      const nuevo={id,Codigo,area,turno:turno||AC[area]?.t||"",selecciones:{...sel},usuario:user.nombre,
        fecha:nowISO(),checks:{...checks},textos:{...txt},fotos:fotosData,obs,estado:"Pendiente",
        notaJef:"",aprobador:"",fechaAprobacion:"",notaGerencia:"",totalItems:items.length,
        completados:done,aprobadorEsperado:APR[area]||"—"};
      await Store.write("ILD",[nuevo,...arr]);
      toast("ILD enviado: "+Codigo); resetCampos(); setArea(""); onSaved();
    }catch(e){ toast("No se pudo enviar: "+(e.message||"error")); }
    finally{ setBusy(false); }
  }
  return <div>
    <div className="card">
      <Field label="Área" req>
        <select className="inp" value={area} onChange={e=>setArea(e.target.value)}>
          <option value="">Selecciona…</option>
          {areas.map(a=><option key={a}>{a}</option>)}</select></Field>
      {area && <div className="hint">Aprobador: <b>{APR[area]||"—"}</b></div>}
    </div>
    {needsTurno && <div className="card"><h3>🔄 Turno</h3>
      <div className="opts">
        <button className={"opt"+(turno==="Apertura"?" on":"")} onClick={()=>{setTurno("Apertura");resetCampos();}}>🌅 Apertura</button>
        <button className={"opt"+(turno==="Cierre"?" on":"")} onClick={()=>{setTurno("Cierre");resetCampos();}}>🌙 Cierre</button>
      </div></div>}
    {area && modo==='lista' && <>
      <div className="card"><h3>🧹 Zona limpiada</h3>
        <div className="hint">Elige la zona que acabas de limpiar y adjunta de 3 a 5 fotos. Puedes registrar varias a lo largo del día.</div>
        <div className="opts" style={{flexDirection:"column",alignItems:"stretch",gap:6,marginTop:8}}>
          {items.map((it,i)=>{ const tx=itemText(it);
            return <button key={i} className={"opt"+(zona===tx?" on":"")} style={{textAlign:"left"}} onClick={()=>setZona(tx)}>{zona===tx?"🔘":"⚪"} {tx}</button>; })}
        </div></div>
      <div className="card"><h3>📷 Fotos — {fotos.length}/3–5</h3>
        <input id="ild-file-l" type="file" accept="image/*" capture="environment" multiple style={{display:"none"}} onChange={onFiles}/>
        <button className="btn ghost block" onClick={()=>document.getElementById("ild-file-l").click()}>
          {fotos.length>=3?(fotos.length>=5?"📸 Máximo (5) ✓":"📸 Agregar más (hasta 5)"):`📸 Subir (faltan ${3-fotos.length})`}</button>
        <div className="fgrid">{fotos.map((s,i)=><div key={i} className="fthumb">
          <img src={s} onClick={()=>setFoto(s)}/>
          <button className="fdel" onClick={()=>setFotos(f=>f.filter((_,j)=>j!==i))}>✕</button>
          <span className="fnum">{i+1}</span></div>)}</div></div>
      <div className="card"><Field label="Observaciones (opcional)">
        <textarea className="inp" value={obs} onChange={e=>setObs(e.target.value)} placeholder="Novedades de la zona…"/></Field>
        <button className="btn primary block" disabled={busy} onClick={enviar}>{busy?"Enviando…":"Enviar ILD de zona"}</button></div>
    </>}
    {area && modo!=='lista' && (!needsTurno||turno) && <>
      <div className="card">
        <h3>Checklist — {done}/{total}</h3>
        <div className="pbar"><i style={{width:pct+"%",background:pct===100?"var(--green)":"var(--ocean)"}}/></div>
        {items.map((it,i)=>{ const tx=itemText(it),tp=itemTipo(it);
          if(tp==='sino') return <div key={i} className="qcard"><div className="qt">{i+1}. {tx}</div>
            <div className="opts">
              <button className={"opt si"+(checks['yn-'+i]==='si'?" on":"")} onClick={()=>setChecks(c=>({...c,['yn-'+i]:'si'}))}>✅ Sí</button>
              <button className={"opt no"+(checks['yn-'+i]==='no'?" on":"")} onClick={()=>setChecks(c=>({...c,['yn-'+i]:'no'}))}>❌ No</button>
            </div></div>;
          if(tp==='apertura_cierre'||tp==='comida'){ const ops=tp==='apertura_cierre'?['Apertura','Cierre']:['Desayuno','Almuerzo','Cena'];
            return <div key={i} className="qcard"><div className="qt">{i+1}. {tx}</div>
              <div className="opts">{ops.map(op=><button key={op} className={"opt"+(sel[i]===op?" on":"")} onClick={()=>setSel(s=>({...s,[i]:op}))}>{op}</button>)}</div></div>; }
          if(tp==='texto') return <div key={i} className="qcard"><div className="qt">{i+1}. {tx}</div>
            <textarea className="inp" placeholder="Escribe aquí (opcional)…" value={txt[i]||""} onChange={e=>setTxt(s=>({...s,[i]:e.target.value}))}/></div>;
          return <div key={i} className={"crow"+(checks[i]?" on":"")} onClick={()=>setChecks(c=>({...c,[i]:!c[i]}))}>
            <div className="cbox">{checks[i]?"✓":""}</div><span className="ctext">{i+1}. {tx}</span></div>;
        })}
      </div>
      {req>0 && <div className="card"><h3>📷 Fotos — {fotos.length}/{req}</h3>
        <input id="ild-file" type="file" accept="image/*" capture="environment" multiple style={{display:"none"}} onChange={onFiles}/>
        <button className="btn ghost block" onClick={()=>document.getElementById("ild-file").click()}>
          {fotos.length>=req?"📸 Completo ✓":`📸 Subir (${req-fotos.length} restantes)`}</button>
        <div className="fgrid">{fotos.map((s,i)=><div key={i} className="fthumb">
          <img src={s} onClick={()=>setFoto(s)}/>
          <button className="fdel" onClick={()=>setFotos(f=>f.filter((_,j)=>j!==i))}>✕</button>
          <span className="fnum">{i+1}</span></div>)}</div></div>}
      <div className="card"><Field label="Observaciones (opcional)">
        <textarea className="inp" value={obs} onChange={e=>setObs(e.target.value)} placeholder="Novedades del turno…"/></Field>
        <button className="btn primary block" disabled={busy} onClick={enviar}>{busy?"Enviando…":"Enviar ILD"}</button>
      </div>
    </>}
  </div>;
}

function ILDPanel({user,regs,reload,toast,setFoto}){
  const [filtro,setFiltro]=useState("todos"); const [per,setPer]=useState(90); const [det,setDet]=useState(null);
  const lim=new Date(); lim.setDate(lim.getDate()-per);
  let base=regs.filter(r=>new Date(r.fecha)>=lim);
  if(!esGD(user)) base=base.filter(r=>(user.areas||[]).includes(r.area));
  if(filtro!=="todos") base=base.filter(r=>r.estado===filtro);
  // Histórico completo de la jefatura (para exportar, sin filtro de período)
  const mios=esGD(user)?regs:regs.filter(r=>(user.areas||[]).includes(r.area));
  function exportar(){ if(!mios.length){toast("No hay ILD para exportar");return;}
    const ok=exportXLSX(mios.map(ildToRow),"ILD",`ILD_${esGD(user)?"General":user.nombre.replace(/\s+/g,"_")}_${yr()}`);
    if(ok) toast("Exportando "+mios.length+" ILD…"); }
  return <div>
    <div className="row" style={{justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <span style={{color:"var(--muted)",fontSize:13}}>{mios.length} ILD en tu histórico</span>
      <button className="btn green" style={{padding:"9px 14px"}} onClick={exportar}>⬇ Exportar Excel</button>
    </div>
    <div className="seg">

function colorCumpl(p){ return p>=85?"--green":p>=50?"--amber":"--red"; }
function ILDDash({user,regs}){
  const meses=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  const hoy=new Date();
  const areasUser = esGD(user)?Object.keys(AC):(user.areas||[]);
  const grupos=[...new Set(areasUser.map(a=>AC[a]?.g).filter(Boolean))];
  const [grp,setGrp]=useState("todas"); const [mes,setMes]=useState(hoy.getMonth()); const year=hoy.getFullYear();
  const esMesActual = mes===hoy.getMonth();
  // filas por grupo -> área -> turno
  const filasDe=area=>{ const ac=AC[area]; if(!ac) return [];
    const turnos = ac.turno ? ["Apertura","Cierre"] : [ac.t||"Diurno"]; return turnos; };
  function rowData(area,turno){
    const recs=regs.filter(r=>r.area===area && (AC[area]?.turno ? r.turno===turno : true)
      && new Date(r.fecha).getFullYear()===year && new Date(r.fecha).getMonth()===mes);
    const ap=recs.filter(r=>r.estado==='Aprobado').length;
    const ob=recs.filter(r=>r.estado==='Con observaciones').length;
    const pe=recs.filter(r=>r.estado==='Pendiente').length;
    const dias=diasEsperados(area,year,mes,esMesActual);
    const diasMes=diasEsperados(area,year,mes,false);
    const cumpl=dias?Math.round(((ap+ob)/dias)*100):0;
    const aprob=recs.filter(r=>r.fechaAprobacion);
    const horas=aprob.length?(aprob.reduce((s,r)=>s+(new Date(r.fechaAprobacion)-new Date(r.fecha)),0)/aprob.length/3600000):0;
    return {area,turno,subidos:recs.length,ap,ob,pe,dias,diasMes,cumpl,horas};
  }
  const gruposVis=(grp==="todas"?grupos:[grp]);
  const tablas=gruposVis.map(g=>{ const areasG=areasUser.filter(a=>AC[a]?.g===g);
    const rows=[]; areasG.forEach(a=>filasDe(a).forEach(t=>rows.push(rowData(a,t))));
    return {g,rows};
  }).filter(t=>t.rows.length);
  // resumen global del mes
  const allRows=tablas.flatMap(t=>t.rows);
  const tot=allRows.reduce((s,r)=>s+r.subidos,0), tAp=allRows.reduce((s,r)=>s+r.ap,0),
        tOb=allRows.reduce((s,r)=>s+r.ob,0), tPe=allRows.reduce((s,r)=>s+r.pe,0),
        tDias=allRows.reduce((s,r)=>s+r.dias,0), cumGlobal=tDias?Math.round(((tAp+tOb)/tDias)*100):0;
  function exportar(){ const rows=allRows.map(r=>({Grupo:AC[r.area]?.g,Area:r.area,Turno:r.turno,
    DiasEsperados:r.dias,DiasMes:r.diasMes,Subidos:r.subidos,Aprobados:r.ap,ConObs:r.ob,Pendientes:r.pe,
    Cumplimiento:r.cumpl+"%",TiempoPromHoras:r.horas.toFixed(2)}));
    exportXLSX(rows,"Dashboard",`Dashboard_ILD_${meses[mes]}_${year}`); }
  return <div>
    <div className="row" style={{marginBottom:12}}>
      <select className="inp" style={{flex:1}} value={grp} onChange={e=>setGrp(e.target.value)}>
        <option value="todas">Todos los grupos</option>{grupos.map(g=><option key={g}>{g}</option>)}</select>
      <select className="inp" style={{flex:1}} value={mes} onChange={e=>setMes(Number(e.target.value))}>
        {meses.map((m,i)=><option key={i} value={i}>{m}</option>)}</select>
    </div>
    <div className="row" style={{justifyContent:"flex-end",marginBottom:10}}>
      <button className="btn green" style={{padding:"8px 14px"}} onClick={exportar}>⬇ Excel</button></div>
    <div className="kpis">
      {[["Total",tot,"--blue"],["Aprobados",tAp,"--green"],["Con obs.",tOb,"--purple"],
        ["Pendientes",tPe,"--amber"],["% Cumplimiento",tDias?cumGlobal+"%":"—",colorCumpl(cumGlobal)]].map(([l,v,c])=>
        <div className="kpi" key={l} style={{borderTop:"3px solid "+cssVar(c)}}>
          <div className="kn" style={{color:cssVar(c)}}>{v}</div><div className="kl">{l}</div></div>)}
    </div>
    <div className="hint" style={{margin:"-4px 0 12px"}}>Cumplimiento = (Aprobados + Con obs.) ÷ días esperados{esMesActual?` hasta hoy (día ${hoy.getDate()})`:" del mes"}.</div>
    {!tablas.length && <div className="empty"><div className="e">📭</div>Sin ILD en {meses[mes]}</div>}
    {tablas.map(({g,rows})=><div className="dgrp" key={g}>
      <div className="ghead">📁 {g.toUpperCase()}</div>
      <div className="dscroll"><table className="dtable">
        <thead><tr><th>Turno</th><th>Días</th><th>Subidos</th><th>Aprob.</th><th>Obs.</th><th>Cumpl.</th><th>Tiempo (h)</th></tr></thead>
        <tbody>{rows.map((r,i)=><tr key={i}>
          <td>{r.turno}<div className="ddias">{r.area}</div></td>
          <td><span className="dnum">{r.dias}</span><div className="ddias">/{r.diasMes} mes</div></td>
          <td><span className="dnum">{r.subidos}</span></td>
          <td><span className="dnum g">{r.ap}</span></td>
          <td>{r.ob?<span className="dnum p">{r.ob}</span>:<span style={{color:"#ccc"}}>–</span>}</td>
          <td><span className="dcirc" style={{borderColor:cssVar(colorCumpl(r.cumpl)),color:cssVar(colorCumpl(r.cumpl))}}>{r.cumpl}%</span></td>
          <td>{r.horas?r.horas.toFixed(2):"0.00"}</td></tr>)}</tbody>
      </table></div>
    </div>)}
  </div>;
}

function ChecklistEditor({user,toast,onSave}){
  const areas = esGD(user)?Object.keys(AC):(user.areas||[]);
  const norm = it => (typeof it==='object'&&it)?{t:it.t,tipo:it.tipo||'foto'}:{t:it,tipo:'foto'};
  const [area,setArea]=useState(areas[0]||"");
  const [items,setItems]=useState(()=> (CL[area]||[]).map(norm));
  useEffect(()=>{ setItems((CL[area]||[]).map(norm)); },[area]);
  const TIPOS=[["foto","📷 Foto"],["sino","✅ Sí/No"],["texto","📝 Texto"],["apertura_cierre","🔁 Apertura/Cierre"],["comida","🍽️ Desayuno/Almuerzo/Cena"]];
  const upd=(i,k,v)=>setItems(arr=>arr.map((it,j)=>j===i?{...it,[k]:v}:it));
  const del=i=>setItems(arr=>arr.filter((_,j)=>j!==i));
  const mover=(i,d)=>setItems(arr=>{ const j=i+d; if(j<0||j>=arr.length)return arr; const c=[...arr]; [c[i],c[j]]=[c[j],c[i]]; return c; });
  const add=()=>setItems(arr=>[...arr,{t:"",tipo:"foto"}]);
  async function guardar(){ const prev=(CL[area]||[]).map(norm);
    const clean=items.filter(it=>String(it.t).trim()).map(it=>({t:it.t.trim(),tipo:it.tipo}));
    const pT=prev.map(x=>x.t), nT=clean.map(x=>x.t);
    const agreg=nT.filter(t=>!pT.includes(t)), elim=pT.filter(t=>!nT.includes(t));
    CL[area]=clean; onSave(); toast("Checklist actualizado: "+area);
    if(user.rol!=='desarrollador'){
      let det=[]; if(agreg.length) det.push(`agregó ${agreg.length} ítem(s): ${agreg.slice(0,3).join(", ")}${agreg.length>3?"…":""}`);
      if(elim.length) det.push(`eliminó ${elim.length} ítem(s): ${elim.slice(0,3).join(", ")}${elim.length>3?"…":""}`);
      if(!det.length) det.push("modificó ítems o tipos");
      await addNotif("Desarrollador", `${user.nombre} cambió el checklist de "${area}" (${det.join("; ")}).`, "", area);
    }
  }
  const [modo,setModo]=useState(()=>areaModo(area));
  useEffect(()=>{ setModo(areaModo(area)); },[area]);
  function cambiarModo(v){ setModo(v); AMODO[area]=v; }
  if(!areas.length) return <div className="empty"><div className="e">🔒</div>No tienes áreas asignadas para personalizar.</div>;
  const nFotos=items.filter(it=>it.tipo==='foto').length;
  return <div>
    <div className="card"><Field label="Área a personalizar">
      <select className="inp" value={area} onChange={e=>setArea(e.target.value)}>{areas.map(a=><option key={a}>{a}</option>)}</select></Field>
      <Field label="Modo del ILD" hint="'Lista' = el usuario elige UNA opción de la lista y sube de 3 a 5 fotos (ideal Áreas Públicas). 'Normal' = checklist completo.">
        <select className="inp" value={modo} onChange={e=>cambiarModo(e.target.value)}>

/* ===== TABLEROS EN TIEMPO REAL (Compras / Sistemas / Mantenimiento) ===== */
function dFiltro(rows,campo,anio,mes){
  return rows.filter(r=>{ const d=r[campo]?new Date(r[campo]):null; if(!d||isNaN(d)) return false;
    if(anio && d.getFullYear()!==anio) return false;
    if(mes!=null && d.getMonth()!==mes) return false; return true; });
}
function dCuenta(rows,campo){ const m={}; rows.forEach(r=>{ const k=(r[campo]||"—"); m[k]=(m[k]||0)+1; });
  return Object.entries(m).map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value); }
function dPromDias(rows,ini,fin){ const ds=rows.map(r=>{ if(!r[ini]||!r[fin])return null; const a=new Date(r[ini]),b=new Date(r[fin]);
    if(isNaN(a)||isNaN(b))return null; return (b-a)/86400000; }).filter(x=>x!=null);
  return ds.length?(ds.reduce((s,x)=>s+x,0)/ds.length).toFixed(1):"—"; }
function fmtDur(min){ if(min==null||isNaN(min)) return "—"; let m=Math.round(min);
  const d=Math.floor(m/1440); m-=d*1440; const h=Math.floor(m/60); m-=h*60;
  const p=[]; if(d) p.push(d+"d"); if(h) p.push(h+"h"); p.push(m+"min"); return p.join(" "); }
function dPromMin(rows,ini,fin){ const ds=rows.map(r=>{ if(!r[ini]||!r[fin])return null; const a=new Date(r[ini]),b=new Date(r[fin]);
    if(isNaN(a)||isNaN(b))return null; return (b-a)/60000; }).filter(x=>x!=null);
  return ds.length?fmtDur(ds.reduce((s,x)=>s+x,0)/ds.length):"—"; }
function dPromCal(rows){ const cs=rows.map(r=>Number(r.EncuestaCal)).filter(x=>x>0);
  return cs.length?(cs.reduce((s,x)=>s+x,0)/cs.length).toFixed(2):"—"; }
function KpiBox({label,value,color}){ return <div className="kpi" style={{borderTop:"3px solid "+(color||"var(--ocean)")}}>
  <div className="kn" style={{color:color||"var(--ocean)"}}>{value}</div><div className="kl">{label}</div></div>; }
function BarsH({data,color}){ const max=Math.max(1,...data.map(d=>d.value));
  if(!data.length) return <div className="hint">Sin datos en el período</div>;
  return <div style={{display:"flex",flexDirection:"column",gap:8}}>{data.map(d=>
    <div key={d.label} style={{display:"flex",alignItems:"center",gap:8}}>
      <div style={{flex:"0 0 40%",fontSize:12,textAlign:"right",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}} title={d.label}>{d.label}</div>
      <div style={{flex:1,background:"#eef1f3",borderRadius:6,height:18}}><div style={{width:(d.value/max*100)+"%",background:color||"var(--ocean)",height:"100%",borderRadius:6,minWidth:d.value?4:0}}></div></div>
      <div style={{flex:"0 0 30px",fontWeight:800,fontSize:13}}>{d.value}</div></div>)}</div>;
}
function Tablero({tipo}){
  const isCom=tipo==="Compras"; const isSis=tipo==="Sistemas";
  const now=new Date();
  const [anio,setAnio]=useState(now.getFullYear()); const [mes,setMes]=useState(null);
  const [f,setF]=useState([]); const [cargando,setCargando]=useState(true);
  const anios=[now.getFullYear()-2,now.getFullYear()-1,now.getFullYear()];
  const MESES=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  useEffect(()=>{ let vivo=true; (async()=>{ setCargando(true);
    try{ const data=mes==null?await Store.readAnio(tipo,anio):await Store.readMes(tipo,anio,mes); if(vivo) setF(data); }
    catch(e){ if(vivo) setF([]); } finally{ if(vivo) setCargando(false); } })(); return ()=>{vivo=false;}; },[anio,mes]);
  let kpis=[], extra=null;
  if(isCom){
    const aprob=f.filter(r=>["En compra","Listo para entregar","Entregado","Cerrada"].includes(r.Estado)).length;

    kpis=[["Recibidas",f.length,"--ocean"],["Aprobadas",aprob,"--green"],["Rechazadas",rech,"--coral"],["Pendientes",pend,"--amber"],
      ["Entregadas",entr,"--blue"],["T. prom. aprobación",dPromMin(f,"FechaSolicitud","FechaAprob"),"--purple"],
      ["Calificación",dPromCal(f),"--green"],["Encuestas",f.filter(r=>r.EncuestaCal).length,"--blue"]];
    extra=<div className="card"><h3>Solicitudes por departamento</h3><BarsH data={dCuenta(f,"Area")} color="var(--ocean)"/></div>;
  } else {
    const concl=f.filter(r=>["Concluido","Cerrado"].includes(r.Estado)).length;
    const validas=f.filter(r=>r.Estado!=="Rechazado");
    const cumpl=validas.length?Math.round(concl/validas.length*100):0;
    kpis=[["Recibidas",f.length,"--ocean"],["Concluidas",concl,"--green"],["Cumplimiento",cumpl+"%",cumpl>=100?"--green":"--amber"],
      ["T. prom. respuesta",dPromMin(f,"FechaCreacion","FechaConcluido"),"--purple"],
      ["Calificación",dPromCal(f),"--green"],["Encuestas",f.filter(r=>r.EncuestaCal).length,"--blue"]];
    const prioCampo=isSis?"Urgencia":"TipoSolicitud";
    extra=<>
      <div className="card"><h3>Solicitudes por departamento</h3><BarsH data={dCuenta(f,"Departamento")} color="var(--ocean)"/></div>
      <div className="card"><h3>Por prioridad</h3><BarsH data={dCuenta(f,prioCampo)} color="var(--blue)"/></div>
      {!isSis && <div className="card"><h3>Cumplimiento de cierre</h3><BarsH data={dCuenta(f.filter(r=>r.CierreCumplimiento),"CierreCumplimiento")} color="var(--green)"/></div>}
    </>;
  }
  return <div>
    <div className="seg" style={{flexWrap:"wrap"}}>{anios.map(a=><button key={a} className={anio===a?"on":""} onClick={()=>setAnio(a)}>{a}</button>)}</div>

      <button className={mes==null?"on":""} onClick={()=>setMes(null)}>Año</button>

    {cargando ? <div className="hint" style={{padding:"20px 0"}}>Cargando datos del período…</div>
      : <><div className="kpis">{kpis.map(([l,v,c])=><KpiBox key={l} label={l} value={v} color={cssVar(c)}/>)}</div>{extra}</>}
  </div>;
}

      <Field label="Tiempo de compra" req><select className="inp" value={f.TiempoCompra} onChange={e=>ch("TiempoCompra",e.target.value)}>{TIEMPO_COMPRA.map(d=><option key={d}>{d}</option>)}</select></Field>

      <div className="row"><div style={{flex:1}}><Field label="Cantidad" req><input className="inp" inputMode="decimal" value={f.Cantidad} onChange={e=>ch("Cantidad",e.target.value)}/></Field></div>

function actaCompra(item){
  const f=(d)=>d?new Date(d).toLocaleString('es-EC'):'—';
  const conf=item.ActaEntrega||'Recibido conforme';
  const esc=s=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const html=`<!doctype html><html lang="es"><head><meta charset="utf-8"><title>Acta ${esc(item.Codigo)}</title>
  <style>body{font-family:'Segoe UI',Arial,sans-serif;color:#1b2a32;max-width:720px;margin:28px auto;padding:0 26px;line-height:1.55}
  h1{font-size:21px;margin:8px 0 16px}.tag{display:inline-block;background:#fbeec4;color:#7a5b00;padding:4px 12px;border-radius:7px;font-weight:700;font-size:13px}
  .r{margin:3px 0}b{color:#0b3b46}.firmas{margin-top:22px}.firma{margin:10px 0;padding-left:12px;border-left:3px solid #0b6b7a}
  .meta{color:#5b6b72;font-size:13px}p{margin:12px 0}</style></head><body>
  <div class="tag">${esc(conf)}</div>
  <h1>Solicitud de compras No. ${esc(item.Codigo)} - Acta de Entrega</h1>
  <p>Con la presente acta HOTELERA PARAISO S.A. hace la entrega de lo siguiente:</p>
  <div class="r"><b>Tipo de Compra:</b> ${esc(item.TipoCompra)}</div>
  <div class="r"><b>Justificación del requerimiento:</b> ${esc(item.Justificacion)}</div>
  <div class="r"><b>Cantidad:</b> ${esc(item.Cantidad)}</div>
  <div class="r"><b>Medida:</b> ${esc(item.Unidad)}</div>
  <div class="r"><b>Modelo:</b> ${esc(item.Modelo)}</div>
  <div class="r"><b>Descripción del requerimiento:</b> ${esc(item.Descripcion)}</div>
  <p>El colaborador manifiesta que se entregó el requerimiento en perfectas condiciones, y será utilizada dentro de la jornada laboral establecidos por la empresa.</p>
  <p>En caso de daño o pérdida o falta de devolución del equipo, el colaborador autoriza el descuento de valores de reposición en sus haberes pendientes.</p>
  ${item.ComentarioActa?`<p class="meta"><b>Observaciones:</b> ${esc(item.ComentarioActa)}</p>`:''}
  <div class="firmas"><b>Estado final: ${esc(conf)}</b>
    <div class="firma"><b>Recibido por (área solicitante):</b> ${esc(item.Receptor||item.Solicitante)}<br><span class="meta">${f(item.FechaCierre)}</span></div>
    ${item.Aprobador?`<div class="firma"><b>Aprobó / entregó:</b> ${esc(item.Aprobador)}<br><span class="meta">${f(item.FechaAprob)}</span></div>`:''}
    <div class="firma"><b>Solicitado por:</b> ${esc(item.Solicitante)}<br><span class="meta">${f(item.FechaSolicitud)}</span></div>
  </div>
  </body></html>`;
  const w=window.open("","_blank");
  if(!w){ alert("Permite ventanas emergentes para exportar el acta en PDF."); return; }
  w.document.write(html); w.document.close(); w.focus();
  setTimeout(function(){ try{ w.print(); }catch(e){} },350);
}

function ComprasModal({modal,user,onClose,apply,toast,setFoto}){
  const {t,item}=modal;
  const [com,setCom]=useState(""); const [fecha,setFecha]=useState(item.FechaTentativa||""); const [cal,setCal]=useState(0);
  const [acta,setActa]=useState("Recibido conforme");
  async function go(){
    if(t==="aprobar"){ await apply(item.Codigo,{Estado:"En compra",Aprobador:user.nombre,FechaAprob:nowISO(),Comentario:com,FechaTentativa:fecha}); toast("Aprobada por Compras"); }
    else if(t==="enviarGG"){ await apply(item.Codigo,{Estado:"En Gerencia",EnviadoGG:"Si",Aprobador:user.nombre,FechaAprob:nowISO(),Comentario:com}); toast("Enviada a Gerencia"); }
    else if(t==="aprobarGG"){ await apply(item.Codigo,{Estado:"En compra",AprobadorGG:user.nombre,FechaGG:nowISO(),ComentarioGG:com}); toast("Aprobada por Gerencia · Compras asignará la fecha"); }
    else if(t==="rechazar"){ if(!com.trim()){toast("El motivo es obligatorio");return;} await apply(item.Codigo,{Estado:"Rechazada",Aprobador:user.nombre,FechaAprob:nowISO(),Comentario:com}); toast("Rechazada"); }
    else if(t==="rechazarGG"){ if(!com.trim()){toast("El motivo es obligatorio");return;} await apply(item.Codigo,{Estado:"Rechazada",AprobadorGG:user.nombre,FechaGG:nowISO(),ComentarioGG:com}); toast("Rechazada por Gerencia"); }
    else if(t==="reprogramar"){ if(!fecha){toast("Indica la nueva fecha de entrega");return;} await apply(item.Codigo,{FechaTentativa:fecha,Comentario:com?("Reprogramada — "+com):item.Comentario,Reprogramada:"Si"}); toast("Fecha reprogramada"); }
    else if(t==="baja"){ if(!com.trim()){toast("Indica el motivo de la baja");return;} await apply(item.Codigo,{Estado:"Baja por presupuesto",Comentario:com,FechaCierre:nowISO()}); toast("Solicitud dada de baja"); }
    else if(t==="listo"){ await apply(item.Codigo,{Estado:"Listo para entregar",FechaEntrega:nowISO()}); toast("Listo para entregar"); }
    else if(t==="recibir"){ await apply(item.Codigo,{Estado:"Entregado",ActaEntrega:acta,ComentarioActa:com,Receptor:user.nombre,FechaCierre:nowISO()}); toast("Recibido registrado · acta generada"); }
    else if(t==="encuesta"){ if(!cal){toast("Selecciona calificación");return;} await apply(item.Codigo,{Estado:"Cerrada",EncuestaCal:cal,EncuestaComentario:com,FechaEncuesta:nowISO()}); toast("¡Gracias por calificar!"); }
    onClose();
  }
  const titles={ver:"Detalle de la solicitud",aprobar:"Aprobar (Compras)",enviarGG:"Enviar a Gerencia General",aprobarGG:"Aprobar (Gerencia)",rechazar:"Rechazar",rechazarGG:"Rechazar (Gerencia)",reprogramar:"Reprogramar fecha de entrega",baja:"Dar de baja por presupuesto",listo:"Marcar listo",recibir:"Confirmar recibido · Acta de entrega",encuesta:"Calificar el servicio"};
  const needCom = t.startsWith("rechazar")||t==="baja";
  return <Modal title={titles[t]} onClose={onClose}>
    {t==="ver" ? <div>
      {[["Código",item.Codigo],["Solicitante",item.Solicitante],["Área",item.Area],["Tiempo de compra",item.TiempoCompra],
        ["Tipo de compra",item.TipoCompra],["Necesaria para",fmtDate(item.FechaNecesidad)],["Presupuesto",item.Presupuesto],
        ["Cantidad",`${item.Cantidad} ${item.Unidad}`],["Modelo",item.Modelo],["Descripción",item.Descripcion],
        ["Justificación",item.Justificacion],["Proveedores",item.Proveedores],["Estado",item.Estado],
        ["Tentativa entrega",fmtDate(item.FechaTentativa)],["Aprobó Compras",item.Aprobador||"—"],["Comentario",item.Comentario||"—"],
        ["Decisión Gerencia",item.AprobadorGG?`${item.AprobadorGG} · ${item.ComentarioGG||""}`:"—"],
        ["Acta",item.ActaEntrega||"—"],["Recibió",item.Receptor||"—"],["Calificación",item.EncuestaCal?item.EncuestaCal+"/10":"—"]].map(([k,v])=>
        <div className="kv" key={k}><b>{k}</b><span style={{textAlign:"right",maxWidth:"62%"}}>{v}</span></div>)}
      {(item.Fotos||[]).length>0 && <><h3 style={{margin:"12px 0 6px"}}>📷 Foto</h3>
        <div className="fgrid">{item.Fotos.map((f,i)=><SpImg key={i} foto={f} idx={i+1} onClick={setFoto}/>)}</div></>}
      {["Entregado","Cerrada"].includes(item.Estado) && <button className="btn ocean block" style={{marginTop:12}} onClick={()=>actaCompra(item)}>📄 Exportar Acta de Entrega (PDF)</button>}
    </div> : <div>
      {(t==="aprobar"||t==="reprogramar") && <Field label="Fecha tentativa de entrega" req={t==="reprogramar"} hint="La asigna el Coordinador de Compras. Vacía = no se marca como vencida."><input type="date" className="inp" value={fecha} onChange={e=>setFecha(e.target.value)}/></Field>}
      {t==="recibir" && <><Field label="Resultado de la entrega"><select className="inp" value={acta} onChange={e=>setActa(e.target.value)}><option>Recibido conforme</option><option>Recibido con observaciones</option></select></Field>
        <div className="hint">Al confirmar, el ítem queda como <b>Entregado</b> y podrás exportar el Acta en PDF.</div></>}
      {t==="encuesta" && <Field label="Calificación (1-10)"><Stars value={cal} onChange={setCal}/></Field>}
      <Field label={t.startsWith("rechazar")?"Motivo del rechazo":t==="baja"?"Motivo de la baja (p. ej. falta de presupuesto)":t==="reprogramar"?"Motivo de la reprogramación (opcional)":"Comentario"} req={needCom}><textarea className="inp" value={com} onChange={e=>setCom(e.target.value)}/></Field>
      <div className="row end"><button className="btn ghost" onClick={onClose}>Cancelar</button>
        <button className={"btn "+(needCom?"red":"primary")} onClick={go}>Confirmar</button></div></div>}
  </Modal>;
}

function TicketModal({tipo,isSis,modal,user,equipo,onClose,apply,toast,setFoto}){
  const {t,item}=modal;
  const opciones=(equipo&&equipo.length)?equipo:[];
  const [com,setCom]=useState(""); const [fecha,setFecha]=useState(item.FechaTentativa||""); const [cal,setCal]=useState(0);
  const [tecnico,setTecnico]=useState(item.Asignado||opciones[0]||""); const [fotos,setFotos]=useState([]); const [busy,setBusy]=useState(false);
  function cumplimiento(){ if(!item.FechaTentativa) return "Concluida"; const lim=(item.FechaTentativa||"").slice(0,10);
    return (new Date().toISOString().slice(0,10) <= lim) ? "Concluida a tiempo" : "Concluida con atraso"; }
  async function go(){
    if(t==="tomar"){ await apply(item.Codigo,{Estado:fecha?"En proceso":"Sin fecha asignada",Asignado:user.nombre,FechaTentativa:fecha}); toast(fecha?"En proceso":"Guardado sin fecha"); }
    else if(t==="asignar"){ if(!tecnico){toast("Selecciona un técnico");return;} if(!fecha){toast("Indica la fecha límite de la tarea");return;}
      await apply(item.Codigo,{Estado:"Asignada",Asignado:tecnico,FechaTentativa:fecha,ComentarioJefe:com});
      await addNotif(tecnico,`Se te asignó la tarea de mantenimiento ${item.Codigo} (para el ${fmtDate(fecha)}).`,"",item.Codigo);
      toast("Tarea asignada a "+tecnico); }
    else if(t==="concluir"){ if(!com.trim()){toast("El comentario de cierre es obligatorio");return;} setBusy(true);
      const fc=fotos.length?await subirFotos(fotos,`MTO_${item.Codigo}`,item.Codigo+"_cierre"):(item.FotosCierre||[]);
      await apply(item.Codigo,{Estado:"Concluido",ComentarioSoporte:com,FechaConcluido:nowISO(),CierreCumplimiento:cumplimiento(),FotosCierre:fc}); toast("Concluido"); }
    else if(t==="concluirTarea"){ if(!com.trim()){toast("Escribe un comentario de la tarea");return;}
      if(!fotos.length){toast("Adjunta al menos una foto de la tarea concluida");return;} setBusy(true);
      const fc=await subirFotos(fotos,`MTO_${item.Codigo}`,item.Codigo+"_cierre"); const cmp=cumplimiento();
      await apply(item.Codigo,{Estado:"Concluido",ComentarioSoporte:com,FechaConcluido:nowISO(),CierreCumplimiento:cmp,FotosCierre:fc});
      toast(cmp); }
    else if(t==="rechazar"){ if(!com.trim()){toast("El motivo es obligatorio");return;} await apply(item.Codigo,{Estado:"Rechazado",ComentarioSoporte:com,Asignado:user.nombre,FechaConcluido:nowISO()}); toast("Rechazado"); }
    else if(t==="encuesta"){ if(!cal){toast("Selecciona calificación");return;} await apply(item.Codigo,{Estado:"Cerrado",EncuestaCal:cal,EncuestaComentario:com,FechaEncuesta:nowISO()}); toast("¡Gracias por calificar!"); }
    onClose();
  }
  const titles={ver:"Detalle del ticket",tomar:"Asignar fecha tentativa",asignar:"Asignar tarea al equipo",concluir:"Concluir ticket",concluirTarea:"Concluir tarea",rechazar:"Rechazar",encuesta:"Calificar el servicio"};
  return <Modal title={titles[t]} onClose={onClose}>
    {t==="ver" ? <div>
      {[["Código",item.Codigo],["Solicitante",item.Solicitante],["Departamento",item.Departamento],
        isSis?["Urgencia",item.Urgencia]:["Tipo",item.TipoSolicitud],
        isSis?["Título",item.Titulo]:["Fecha solicitud",fmtDate(item.FechaSolicitud)],
        ["Descripción",item.Descripcion],["Estado",item.Estado],["Fecha límite",fmtDate(item.FechaTentativa)],
        ["Asignado",item.Asignado||"—"],["Cumplimiento",item.CierreCumplimiento||"—"],["Cierre",item.ComentarioSoporte||"—"],["Calificación",item.EncuestaCal?item.EncuestaCal+"/10":"—"]].map(([k,v])=>
        <div className="kv" key={k}><b>{k}</b><span style={{textAlign:"right",maxWidth:"62%"}}>{v}</span></div>)}
      {(item.Fotos||[]).length>0 && <><h3 style={{margin:"12px 0 6px"}}>📷 Adjuntos</h3>
        <div className="fgrid">{item.Fotos.map((f,i)=><SpImg key={i} foto={f} idx={i+1} onClick={setFoto}/>)}</div></>}
      {(item.FotosCierre||[]).length>0 && <><h3 style={{margin:"12px 0 6px"}}>📷 Fotos de cierre</h3>
        <div className="fgrid">{item.FotosCierre.map((f,i)=><SpImg key={i} foto={f} idx={i+1} onClick={setFoto}/>)}</div></>}
    </div> : <div>
      {t==="asignar" && <><Field label="Técnico responsable" req><select className="inp" value={tecnico} onChange={e=>setTecnico(e.target.value)}>
        {!opciones.length && <option value="">(sin miembros de equipo)</option>}
        {opciones.map(n=><option key={n}>{n}</option>)}</select></Field>
        <Field label="Fecha límite de la tarea" req hint="Según esta fecha se marcará 'a tiempo' o 'con atraso'."><input type="date" className="inp" value={fecha} onChange={e=>setFecha(e.target.value)}/></Field></>}
      {t==="tomar" && <Field label="Fecha tentativa de solución" hint="Sin fecha: queda 'Sin fecha asignada' y NO se marca vencido."><input type="date" className="inp" value={fecha} onChange={e=>setFecha(e.target.value)}/></Field>}
      {t==="encuesta" && <Field label="Calificación (1-10)"><Stars value={cal} onChange={setCal}/></Field>}
      {["rechazar","concluir","concluirTarea","encuesta","asignar"].includes(t) && <Field label={t==="rechazar"?"Motivo del rechazo":t==="concluir"||t==="concluirTarea"?"Comentario de la tarea / soporte":t==="asignar"?"Indicaciones para el técnico (opcional)":"Comentario (opcional)"} req={["rechazar","concluir","concluirTarea"].includes(t)}>
        <textarea className="inp" value={com} onChange={e=>setCom(e.target.value)}/></Field>}
      {(t==="concluirTarea"||t==="concluir") && <PhotoField fotos={fotos} setFotos={setFotos} label={t==="concluirTarea"?"Foto de la tarea concluida":"Foto de cierre (opcional)"} req={t==="concluirTarea"} setFoto={setFoto}/>}
      <div className="row end"><button className="btn ghost" onClick={onClose}>Cancelar</button>
        <button className={"btn "+(t==="rechazar"?"red":"primary")} disabled={busy} onClick={go}>{busy?"Guardando…":"Confirmar"}</button></div></div>}
  </Modal>;
}

function KanModal({proc,tabla,r,canEdit,cols,onClose,onSaved,toast,setFoto}){
  const isCom=tabla==="Compras", isSis=tabla==="Sistemas";
  const titulo=isCom?r.Modelo:isSis?r.Titulo:r.Descripcion;
  const area=isCom?r.Area:r.Departamento;
  const [estado,setEstado]=useState(r.Estado); const [com,setCom]=useState(""); const [fecha,setFecha]=useState(r.FechaTentativa||"");
  async function guardar(){ const arr=await Store.read(tabla);
    const upd=arr.map(x=>{ if(x.Codigo!==r.Codigo) return x; const o={...x,Estado:estado};
      if(com.trim()){ o.ComentarioKanban=com; if(isCom)o.ComentarioGG=com; else o.ComentarioSoporte=com; }
      if(fecha) o.FechaTentativa=fecha; return o; });
    await Store.write(tabla,upd); toast("Solicitud actualizada"); onSaved(); onClose();
  }
  return <Modal title={r.Codigo} onClose={onClose}>
    {[["Solicitante",r.Solicitante],["Área/Depto",area||"—"],["Detalle",titulo||"—"],
      isCom?["Tipo",r.TipoCompra||"—"]:["Prioridad",(isSis?r.Urgencia:r.TipoSolicitud)||"—"],
      ["Descripción",r.Descripcion||r.Justificacion||"—"],["Estado",r.Estado],
      ["Asignado",r.Asignado||"—"],["Fecha",fmtDate(r.FechaTentativa)]].map(([k,v])=>
      <div className="kv" key={k}><b>{k}</b><span style={{textAlign:"right",maxWidth:"62%"}}>{v}</span></div>)}
    {(r.Fotos||[]).length>0 && <><h3 style={{margin:"12px 0 6px"}}>📷 Adjuntos</h3>
      <div className="fgrid">{r.Fotos.map((f,i)=><SpImg key={i} foto={f} idx={i+1} onClick={setFoto}/>)}</div></>}
    {["Entregado","Cerrada","Cerrado"].includes(r.Estado) && <button className="btn ocean block" style={{marginTop:10}} onClick={()=>isCom?actaCompra(r):null} disabled={!isCom}>{isCom?"📄 Acta (PDF)":""}</button>}
    {canEdit ? <div className="card" style={{marginTop:12}}>
      <h3>✎ Gestionar</h3>
      <Field label="Estado"><select className="inp" value={estado} onChange={e=>setEstado(e.target.value)}>{cols.map(c=><option key={c}>{c}</option>)}</select></Field>
      <Field label="Fecha"><input type="date" className="inp" value={fecha} onChange={e=>setFecha(e.target.value)}/></Field>
      <Field label="Comentario"><textarea className="inp" value={com} onChange={e=>setCom(e.target.value)}/></Field>
      <button className="btn primary block" onClick={guardar}>Guardar</button>
    </div> : <div className="hint" style={{marginTop:12}}>Solo lectura.</div>}
  </Modal>;
}
function Kanban({user,toast,setFoto}){
  const mods=["compras","sistemas","mantenimiento"];
  const [proc,setProc]=useState(mods[0]);
  const tabla={compras:"Compras",sistemas:"Sistemas",mantenimiento:"Mantenimiento"}[proc];
  const [rows,setRows]=useState([]); const [over,setOver]=useState(null); const drag=useRef(null);
  const [fArea,setFArea]=useState(""); const [fSolic,setFSolic]=useState(""); const [det,setDet]=useState(null);
  const load=async()=>setRows(await Store.read(tabla)); useEffect(()=>{load();setFArea("");setFSolic("");},[proc]);
  const cols=KANBAN[proc];
  const areaOf=r=>tabla==="Compras"?r.Area:r.Departamento;
  const titleOf=r=>tabla==="Compras"?r.Modelo:tabla==="Sistemas"?r.Titulo:r.Descripcion;
  const prioOf=r=>tabla==="Compras"?(r.TiempoCompra||""):tabla==="Sistemas"?(r.Urgencia||""):(r.TipoSolicitud||"");
  const isUrg=r=>{const p=prioOf(r).toLowerCase();return p.includes("urgente")||p.includes("alta");};
  const areas=[...new Set(rows.map(areaOf).filter(Boolean))].sort();
  const solics=[...new Set(rows.map(r=>r.Solicitante).filter(Boolean))].sort();
  const visibles=rows.filter(r=>(!fArea||areaOf(r)===fArea)&&(!fSolic||r.Solicitante===fSolic));
  function canEditCard(r){ if(esCerrada(r)) return false; if(esDev(user)) return true;
    if(gestionaModulo(user,proc)) return true;
    if(user.rol==='gerencia' && proc==='compras' && r.Estado==='En Gerencia') return true;
    return false; }
  async function move(code,estado){ const r=rows.find(x=>x.Codigo===code); if(!r||!canEditCard(r)) return;
    const arr=await Store.read(tabla);
    await Store.write(tabla,arr.map(x=>x.Codigo===code?{...x,Estado:estado}:x)); load(); toast("Movido a "+estado); }
  return <div>
    <h1 className="h1">Tablero Kanban</h1><p className="sub">Toca una tarjeta para abrirla. Podrás editar solo las que te corresponden.</p>
    <div className="seg">{mods.map(m=><button key={m} className={proc===m?"on":""} onClick={()=>setProc(m)}>{({compras:"Compras",sistemas:"Sistemas",mantenimiento:"Mantenimiento"})[m]}</button>)}</div>
    <div className="kfilters">
      <select value={fArea} onChange={e=>setFArea(e.target.value)}><option value="">Todas las áreas</option>{areas.map(a=><option key={a}>{a}</option>)}</select>
      <select value={fSolic} onChange={e=>setFSolic(e.target.value)}><option value="">Todos los solicitantes</option>{solics.map(s=><option key={s}>{s}</option>)}</select>
      {(fArea||fSolic) && <button className="btn ghost" style={{flex:"0 0 auto"}} onClick={()=>{setFArea("");setFSolic("");}}>Limpiar</button>}
    </div>
    <div className="kcount">{visibles.length} de {rows.length} tarjeta(s){fArea?` · ${fArea}`:""}{fSolic?` · ${fSolic}`:""}</div>
    <div className="kan">{cols.map(col=>{ const cards=visibles.filter(r=>r.Estado===col);
      return <div key={col} className={"kcol"+(over===col?" over":"")} onDragOver={e=>{e.preventDefault();setOver(col);}}
        onDragLeave={()=>setOver(null)} onDrop={e=>{e.preventDefault();setOver(null); if(drag.current) move(drag.current,col);}}>
        <h4><span><span className="dotc" style={{background:colorOf(col)}}></span>{col}</span><span className="cnt">{cards.length}</span></h4>
        {cards.map(r=>{ const ed=canEditCard(r);
          return <div key={r.Codigo} className="kcard" draggable={ed}
          style={{borderLeft:`4px solid ${isOverdue(r)?cssVar("--red"):colorOf(r.Estado)}`,cursor:"pointer"}}
          onClick={()=>setDet(r)} onDragStart={()=>{ if(ed) drag.current=r.Codigo; }} onDragEnd={()=>drag.current=null}>
          <div className="kc">{r.Codigo}{isOverdue(r)?" · ⚠ vencido":""}{esCerrada(r)?" · 🔒":""}</div>
          <div className="kt">{titleOf(r)}</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",margin:"6px 0 2px"}}>
            <span className="kchip">{areaOf(r)||"—"}</span>
            {prioOf(r) && <span className={"kchip"+(isUrg(r)?" urg":"")}>{prioOf(r).split(" ")[0]}</span>}</div>
          <div className="km">👤 {r.Solicitante}{r.FechaTentativa?` · 📅 ${fmtDate(r.FechaTentativa)}`:""}</div>
          <div className="kchip" style={{marginTop:6,display:"inline-block"}}>{ed?"✎ Abrir / editar":"👁 Abrir"}</div></div>;})}
        {!cards.length && <div style={{color:"#aab2b3",fontSize:12,textAlign:"center",padding:"14px 0"}}>—</div>}
      </div>;})}</div>
    {det && <KanModal proc={proc} tabla={tabla} r={det} canEdit={canEditCard(det)} cols={cols}
      onClose={()=>setDet(null)} onSaved={load} toast={toast} setFoto={setFoto}/>}
  </div>;
}

function ClientIdForm({toast}){
  const [cid,setCid]=useState(localStorage.getItem("pp_clientId")||APP.ms.clientId);
  const [tid,setTid]=useState(localStorage.getItem("pp_tenantId")||APP.ms.tenantId);
  function guardar(){ const c=cid.trim(); if(!c){toast("Pega el Client ID");return;}
    localStorage.setItem("pp_clientId",c); if(tid.trim()) localStorage.setItem("pp_tenantId",tid.trim());
    if(!confirm("Guardar y reiniciar la app para conectar con tu App Registration?"))return;
    location.reload(); }
  function restaurar(){ localStorage.removeItem("pp_clientId"); localStorage.removeItem("pp_tenantId"); location.reload(); }
  return <div style={{marginTop:8}}>
    <Field label="Client ID (Application ID)"><input className="inp" value={cid} onChange={e=>setCid(e.target.value)} placeholder="00000000-0000-0000-0000-000000000000"/></Field>
    <Field label="Tenant ID (opcional)"><input className="inp" value={tid} onChange={e=>setTid(e.target.value)}/></Field>
    <div className="row"><button className="btn primary" onClick={guardar}>Guardar y reiniciar</button>
      <button className="btn ghost" onClick={restaurar}>Restaurar por defecto</button></div></div>;
}
function DeleteRecords({toast}){

  const titleOf=r=> mod==="ILD"?`${r.area} · ${r.usuario}` : mod==="Compras"?r.Modelo : mod==="Sistemas"?r.Titulo : r.Descripcion;
  async function del(id){ if(!confirm("¿Eliminar este registro de prueba? Es permanente y no afectará los índices del resto."))return;
