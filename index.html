    <select className="inp" style={{margin:"10px 0"}} value={mod} onChange={e=>setMod(e.target.value)}>
      {["ILD","Compras","Sistemas","Mantenimiento"].map(m=><option key={m}>{m}</option>)}</select>
    {!rows.length && <div className="hint">Sin registros en {mod}.</div>}
    <div style={{maxHeight:320,overflow:"auto"}}>
    {rows.map(r=><div className="kv" key={idOf(r)}>
      <span style={{flex:1}}><b style={{color:"var(--ink)"}}>{codeOf(r)}</b> · {titleOf(r)}</span>
      <button className="btn red" style={{padding:"6px 11px",flex:"0 0 auto"}} onClick={()=>del(idOf(r))}>Eliminar</button></div>)}
    </div></div>;
}
function Admin({user,toast}){
  const [counts,setCounts]=useState({}); const [reloadKey,setReloadKey]=useState(0);
  useEffect(()=>{(async()=>{ const o={}; for(const t of ["ILD","Compras","Sistemas","Mantenimiento"]) o[t]=(await Store.read(t)).length; setCounts(o); })();},[reloadKey]);
  async function exportar(t){ const data=await Store.read(t);
    if(!data.length){toast("Sin datos en "+t);return;}
    const rows = t==="ILD" ? data.map(ildToRow) : data;
    exportXLSX(rows,t,`${t}_PlayaParaiso_${yr()}`); toast("Exportando "+t+"…"); }
  function toggleMode(){ const nm=MODE==="graph"?"local":"graph";
    if(!confirm(nm==="graph"?"Cambiar a modo SharePoint (en vivo)? Se recargará la app.":"Cambiar a modo local (demo)? Se recargará la app.")) return;
    localStorage.setItem("pp_mode",nm); location.reload(); }
  async function cargarHistorico(){
    if(!confirm("Cargar el histórico de ILD ("+ILD_SEED.length+" registros)? No se duplican los ya cargados.")) return;
    try{
      const cur=await Store.read("ILD"); const ids=new Set(cur.map(r=>r.id));
      const add=ILD_SEED.filter(r=>!ids.has(r.id));
      if(!add.length){ toast("El histórico ya está cargado"); return; }
      await Store.write("ILD",[...add,...cur].sort((a,b)=>new Date(b.fecha)-new Date(a.fecha)));
      toast("Histórico cargado: "+add.length+" ILD"); setReloadKey(k=>k+1);
    }catch(e){ toast("No se pudo cargar el histórico ("+(e.message||"")+")"); }
  }
  return <div>
    <h1 className="h1">Configuración</h1><p className="sub">Conexión, datos y mantenimiento.</p>
    <div className="card"><h3>☁️ Conexión SharePoint · Prueba7</h3>
      <div className="kv"><b>Modo</b><span>{MODE==="graph"?"En vivo (SharePoint)":"Local (demo)"}</span></div>
      {MODE==="graph" && <div className="kv"><b>Cuenta Microsoft</b><span>{graphUser||"—"}</span></div>}
      <div className="kv"><b>Registros</b><span>ILD {counts.ILD||0} · Com {counts.Compras||0} · Sis {counts.Sistemas||0} · Mto {counts.Mantenimiento||0}</span></div>
      <div className="kv"><b>Versión</b><span>{APP.version}</span></div>
      <div className="kv" style={{flexDirection:"column",alignItems:"flex-start",gap:4}}><b>Redirect URI (regístralo en Azure)</b>
        <code style={{fontSize:12,wordBreak:"break-all",background:"#f3efe6",padding:"4px 8px",borderRadius:8,width:"100%"}}>{APP.ms.redirectUri}</code></div>
      <div className="row" style={{marginTop:10}}>
        <button className="btn ocean" onClick={()=>setReloadKey(k=>k+1)}>🔄 Sincronizar</button>
        <button className="btn ghost" onClick={toggleMode}>{MODE==="graph"?"Cambiar a demo local":"Conectar a SharePoint"}</button></div>
      <div className="hint" style={{marginTop:8}}>El histórico se guarda en {MODE==="graph"?"SharePoint y se abre desde cualquier dispositivo al iniciar sesión.":"este navegador (modo demo)."}</div>
    </div>
    <div className="card"><h3>🪪 App Registration propia</h3>
      <div className="hint">Pega aquí el <b>Client ID</b> de tu propia App Registration de Azure (queda separada de la del ILD). El Tenant ID es opcional (por defecto usa el mismo).</div>
      <ClientIdForm toast={toast}/></div>
    <div className="card"><h3>📊 Exportar histórico a Excel</h3>
      <div className="row">{["ILD","Compras","Sistemas","Mantenimiento"].map(t=><button key={t} className="btn green" onClick={()=>exportar(t)}>⬇ {t}</button>)}</div>
      <div className="hint" style={{marginTop:8}}>Cada jefatura también puede exportar sus ILD desde ILD → bandeja.</div></div>
    <div className="card"><h3>📥 Histórico de ILD</h3>
      <div className="hint">Carga los <b>{typeof ILD_SEED!=="undefined"?ILD_SEED.length:0} ILD reales</b> (junio) en el almacenamiento, sin duplicar los ya cargados.</div>
      <button className="btn ocean block" style={{marginTop:10}} onClick={cargarHistorico}>📥 Cargar histórico de ILD</button></div>
    <DeleteRecords toast={toast}/>
    <div className="card"><h3>👥 Usuarios y aprobadores</h3>
      <div className="hint">La gestión de colaboradores, áreas asignadas, PINs y aprobadores se hace en <b>ILD → Configurar</b> (rol Desarrollador). Personalización de checklists en <b>ILD → Checklist</b>.</div></div>
  </div>;
}

/* ===== APP ROOT ===== */
function App(){
  const [user,setUser]=useState(()=>{ try{return JSON.parse(sessionStorage.getItem("pp_user"))}catch{return null} });
  const [view,setView]=useState("home"); const [toastMsg,setToastMsg]=useState(""); const [counts,setCounts]=useState({});
  const [foto,setFoto]=useState(null); const [gerr,setGerr]=useState(""); const [cfgVer,setCfgVer]=useState(0);
  const [connected,setConnected]=useState(MODE!=="graph"); const [checking,setChecking]=useState(MODE==="graph");
  const [notifs,setNotifs]=useState([]); const [notifOpen,setNotifOpen]=useState(false); const [detailIld,setDetailIld]=useState(null);
  const bump=()=>setCfgVer(v=>v+1);
  async function loadNotifs(u){ const who=u||user; if(!who) return;
    try{ const all=await Store.read("Notif"); setNotifs(all.filter(n=>n.para===who.nombre)); }catch{} }
  async function abrirNotif(n){
    try{ await Store.remove("Notif", n.id); }catch{}
    try{ const ilds=await Store.read("ILD"); const rec=ilds.find(r=>r.id===n.ildId); if(rec) setDetailIld(rec); }catch{}
    setNotifOpen(false); loadNotifs();
  }
  useEffect(()=>{ (async()=>{
    if(MODE==="graph"){ const ok=await msEnsure(); setConnected(ok);
      if(ok){ try{ applyIldConfig(await cfgRead()); }catch{}
        try{ if(!localStorage.getItem("pp_hist_v1")){
          const pares=[["ILD",ILD_SEED],["Compras",COMPRAS_SEED],["Sistemas",SISTEMAS_SEED],["Mantenimiento",MANT_SEED]];
          for(const [t,seed] of pares){ if(seed && seed.length){ const cur=await Store.read(t); if(!cur.length){ await Store.write(t,seed); } } }
          localStorage.setItem("pp_hist_v1","1"); } }catch(e){}
        bump(); } }
    setChecking(false);
  })(); },[]);
  const toast=m=>{ setToastMsg(m); setTimeout(()=>setToastMsg(""),2600); };
  async function reloadCounts(u){ const who=u||user; if(!who) return;
    const c=await Store.read("Compras"), s=await Store.read("Sistemas"), m=await Store.read("Mantenimiento"), il=await Store.read("ILD");
    const pendChief=(arr,mod,abiertos)=> gestionaModulo(who,mod) ? arr.filter(r=>abiertos.includes(r.Estado)).length
      : arr.filter(r=>r.Solicitante===who.nombre&&!cerrados.includes(r.Estado)).length;
    setCounts({
      compras:pendChief(c,"compras",["Solicitado","En Gerencia","En compra","Listo para entregar"]),
      sistemas:pendChief(s,"sistemas",["Nuevo","Sin fecha asignada","En proceso"]),
      mantenimiento:pendChief(m,"mantenimiento",["Nuevo","Sin fecha asignada","En proceso"]),
      ild:(esGD(who)||who.rol==='aprobador')?il.filter(r=>r.estado==='Pendiente'&&(esGD(who)||(who.areas||[]).includes(r.area))).length:0
    });
  }
  useEffect(()=>{ if(user){ reloadCounts(); loadNotifs(); } },[user,view,cfgVer]);
  async function onLogin(u){ sessionStorage.setItem("pp_user",JSON.stringify(u)); setUser(u); setView("home"); }
  function logout(){ sessionStorage.removeItem("pp_user"); setUser(null); setView("home"); }
  if(MODE==="graph" && checking) return <div className="login"><div className="sun"></div><div className="lcard">
    <div className="lbrand"><span className="dot"></span>Playa Paraíso</div>
    <div className="ltag" style={{marginBottom:0}}>Conectando con SharePoint…</div></div></div>;
  if(MODE==="graph" && !connected) return <div className="login"><div className="sun"></div><div className="lcard">
    <div className="lbrand"><span className="dot"></span>Playa Paraíso</div>
    <div className="ltag">Inicia sesión con tu cuenta Microsoft para usar la app. El histórico se guarda en SharePoint (Prueba7).</div>
    <button className="btn ocean block" onClick={()=>msSignIn()}>🔗 Iniciar sesión con Microsoft</button>
    {msErr && <div className="lerr" style={{marginTop:12,whiteSpace:"normal"}}>{msErr}</div>}
    <button className="lback" onClick={()=>{localStorage.setItem("pp_mode","local");location.reload();}}>Usar modo demo local</button>
  </div></div>;
  if(!user) return <Login onLogin={onLogin}/>;
  const rolLbl={desarrollador:"Desarrollador",gerencia:"Gerencia",aprobador:"Aprobador",colaborador:"Colaborador"}[user.rol]||user.rol;
  const titles={ild:"ILD",compras:"Compras",sistemas:"Sistemas",mantenimiento:"Mantenimiento",kanban:"Kanban",admin:"Configuración"};
  return <div className="app">
    <div className="topbar"><div className="brand"><span className="logobox"><img src={LOGO} alt="Playa Paraíso"/></span></div><div className="sp"></div>
      <div className="who">{user.nombre}<br/><span style={{opacity:.85}}>{rolLbl}</span></div>
      <button className="iconbtn" title="Notificaciones" style={{position:"relative"}} onClick={()=>setNotifOpen(true)}>🔔
        {notifs.length>0 && <span style={{position:"absolute",top:-4,right:-4,background:"var(--coral)",color:"#fff",borderRadius:"999px",fontSize:10,fontWeight:800,minWidth:18,height:18,display:"grid",placeItems:"center",padding:"0 4px"}}>{notifs.length}</span>}</button>
      <button className="iconbtn" title="Salir" onClick={logout}>⎋</button></div>
    <div className="content">
      {gerr && <div className="banner">⚠️ {gerr}</div>}
      {view!=="home" && <div className="backrow"><button className="backbtn" onClick={()=>setView("home")}>← Inicio</button>
        <span style={{color:"var(--muted)",fontWeight:600}}>{titles[view]}</span></div>}
      {view==="home" && <Home user={user} go={setView} counts={counts}/>}
      {view==="ild" && <ILD key={cfgVer} user={user} toast={toast} setFoto={setFoto} bump={bump}/>}
      {view==="compras" && <Compras user={user} toast={toast} setFoto={setFoto}/>}
      {view==="sistemas" && <Tickets tipo="Sistemas" user={user} toast={toast} setFoto={setFoto}/>}
      {view==="mantenimiento" && <Tickets tipo="Mantenimiento" user={user} toast={toast} setFoto={setFoto}/>}
      {view==="kanban" && <Kanban user={user} toast={toast} setFoto={setFoto}/>}
      {view==="admin" && <Admin user={user} toast={toast}/>}
    </div>
    {toastMsg && <div className="toast">{toastMsg}</div>}
    <FotoModal src={foto} onClose={()=>setFoto(null)}/>
    {notifOpen && <Modal title="🔔 Notificaciones" onClose={()=>setNotifOpen(false)}>
      {!notifs.length && <div className="empty"><div className="e">📭</div>No tienes notificaciones</div>}
      {notifs.map(n=><div key={n.id} className="item" style={{cursor:"pointer"}} onClick={()=>abrirNotif(n)}>
        <div className="ttl" style={{fontSize:14}}>{n.texto}</div>
        <div className="meta">{fmtDT(n.fecha)} · toca para ver el ILD</div></div>)}
      {notifs.length>0 && <div className="hint">Al abrir una notificación, se marca como leída y desaparece.</div>}
    </Modal>}
    {detailIld && <ILDDetail user={user} r={detailIld} onClose={()=>{setDetailIld(null);loadNotifs();}} reload={()=>{}} toast={toast} setFoto={setFoto}/>}
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
(function(){
  function show(msg){ var r=document.getElementById("root"); if(r&&r.children.length>0)return;
    r.innerHTML='<div style="max-width:560px;margin:40px auto;padding:20px;font-family:Inter,system-ui,sans-serif;color:#1f2a2c">'+
      '<h2 style="color:#0d6e75">Playa Paraíso no pudo cargar</h2><p style="color:#6c7a7c">'+msg+'</p>'+
      '<p style="color:#6c7a7c;font-size:13px">Si lo ves en la vista previa, descarga el archivo y ábrelo en tu navegador o súbelo a Netlify.</p></div>'; }
  window.addEventListener("error",function(e){ show("Detalle: "+(e.message||"error al cargar un recurso")); });
  window.addEventListener("load",function(){ setTimeout(function(){
    if(typeof React==="undefined") return show("No se cargó React (la red bloqueó la CDN).");
    show("La aplicación no se inició. Abre la consola (F12) para más detalle."); },1800); });
})();
</script>
</body>
</html>
